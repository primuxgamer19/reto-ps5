name: Compilador Reto PS5 Final
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Esta variable es obligatoria en 2026 para que GitHub no bloquee el proceso
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias del Sistema
        run: |
          sudo apt-get update || true
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          build-essential libltdl-dev libgmp-dev libmpfr-dev libmpc-dev

      - name: Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython<3.0.0" virtualenv

      - name: Compilar APK con Buildozer
        run: |
          # Usamos python3 -m para asegurar que encuentre el ejecutable
          yes | python3 -m buildozer android debug

      - name: Subir el APK resultante
        uses: actions/upload-artifact@v4
        with:
          name: APK_Reto_PS5_Final
          path: bin/*.apk

name: Compilador Reto PS5
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias Linux
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" cython virtualenv

      - name: Compilar APK
        run: |
          # Agregamos python3 -m para que Github encuentre el programa
          # Y devolvemos el yes | por si Android pide aceptar términos
          yes | python3 -m buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Mi_App_PS5
          path: bin/*.apk
          

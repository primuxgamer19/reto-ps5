name: Compilador Reto PS5 Definitivo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # Con esto silenciamos las alertas amarillas de Node.js para siempre
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Herramientas de Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          build-essential libltdl-dev libgmp-dev libmpfr-dev libmpc-dev

      - name: Instalar Buildozer y Cython Estable
        run: |
          pip install --upgrade pip
          # Usamos Cython 0.29.33, es el más estable para Kivy y evita que muera al minuto 7
          pip install "buildozer>=1.5.0" "cython==0.29.33" virtualenv

      - name: Compilar APK
        run: |
          # SIN EL "yes |" QUE ROMPIÓ LA TUBERÍA. Solo compilación pura.
          python3 -m buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Reto_PS5
          path: bin/*.apk
          

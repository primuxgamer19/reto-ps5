name: Compilador Reto PS5 Terminal
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # EL MILAGRO: Forzamos una versión estable de Ubuntu que no tiene librerías borradas
    runs-on: ubuntu-22.04
    env:
      # Apagamos el error molesto de Node.js 20 permitiendo que GitHub lo use sin llorar
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Herramientas de Linux (Ahora sí las va a encontrar)
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          build-essential libltdl-dev libgmp-dev libmpfr-dev libmpc-dev

      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" cython virtualenv

      - name: Compilar APK
        run: |
          yes | python3 -m buildozer android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Reto_PS5
          path: bin/*.apk
          

name: Compilar Reto PS5 Definitivo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Esto soluciona la advertencia de Node.js 20 forzando la versión 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.15'

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias del sistema (Ubuntu)
        run: |
          sudo apt update
          sudo apt install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev zip unzip cmake ant
          sudo apt install -y pkg-config autoconf automake libtool gettext

      - name: Instalar Buildozer y Cython (Versión estable)
        run: |
          python -m pip install --upgrade pip
          # Fijamos Cython a la versión 0.29.33 para evitar el "Exit code 1" silencioso
          pip install buildozer cython==0.29.33 virtualenv

      - name: Aceptar licencias de Android SDK
        run: |
          yes | buildozer android debug || true

      - name: Compilar APK con Buildozer
        run: buildozer android debug
        
      - name: Subir Artefacto (APK)
        uses: actions/upload-artifact@v4
        with:
          name: Reto_PS5_APK
          path: bin/*.apk

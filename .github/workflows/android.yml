name: Compilador Reto PS5 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17 (Necesario para Android 14/15)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Dependencias del Sistema
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Instalar Buildozer y Herramientas de Compilación
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" cython virtualenv

      - name: Compilar APK (Proceso de 15-20 min)
        run: |
          # Aceptamos licencias y ejecutamos la compilación
          yes | python3 -m buildozer android debug

      - name: Subir APK Resultante
        uses: actions/upload-artifact@v4
        with:
          name: APK_Reto_PS5_Marzo_2026
          path: bin/*.apk
          
